name: Supabase keep-alive

on:
  schedule:
    # Every 3 days at 09:00 UTC (within Supabase free-tier 7-day inactivity window)
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
        run: |
          code=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=user_id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP ${code}"
          cat /tmp/body.txt
          echo
          if [ "${code}" != "200" ]; then
            echo "Keep-alive failed (expected HTTP 200, got ${code})"
            exit 1
          fi
